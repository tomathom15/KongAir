networks:
  kong-edu-net:
    name: kong-edu-net
    driver: bridge
    external: false

services:
 kongair-experience:
  image: kongedu/kongair-experience:1.0
  platform: linux/arm64
  container_name: kongair-experience
  hostname: experience.kongair
  restart: on-failure
  networks:
    - kong-edu-net
  ports:
   - 5050:4000

 kongair-customers:
  image: kongedu/kongair-customers:1.0
  platform: linux/arm64
  container_name: kongair-customers
  hostname: customers.kongair
  restart: on-failure
  networks:
    - kong-edu-net
  ports:
   - 5051:3000

 kongair-flights:
  image: kongedu/kongair-flights:1.0
  platform: linux/arm64
  container_name: kongair-flights
  hostname: flights.kongair
  restart: on-failure
  networks:
    - kong-edu-net
  ports:
   - 5052:8080

 kongair-routes:
  image: kongedu/kongair-routes:1.0
  platform: linux/arm64
  container_name: kongair-routes
  hostname: routes.kongair
  restart: on-failure
  networks:
    - kong-edu-net
  ports:
   - 5053:8080

 kongair-bookings:
  image: kongedu/kongair-bookings:1.0
  platform: linux/arm64
  container_name: kongair-bookings
  hostname: bookings.kongair
  restart: on-failure
  networks:
    - kong-edu-net
  ports:
   - 5054:3000

 kongair-seating:
  build:
    context: ./seating
    dockerfile: Dockerfile
  platform: linux/arm64
  container_name: kongair-seating
  hostname: seating.kongair
  restart: on-failure
  networks:
    - kong-edu-net
  ports:
   - 5055:5055
  environment:
    - PORT=5055

 kongair-operations:
  build:
    context: ./operations
    dockerfile: Dockerfile
  platform: linux/arm64
  container_name: kongair-operations
  hostname: operations.kongair
  restart: on-failure
  networks:
    - kong-edu-net
  ports:
   - 5056:5056
  environment:
    - PORT=5056

 kongair-ancillary:
  build:
    context: ./ancillary
    dockerfile: Dockerfile
  platform: linux/arm64
  container_name: kongair-ancillary
  hostname: ancillary.kongair
  restart: on-failure
  networks:
    - kong-edu-net
  ports:
   - 5057:5057
  environment:
    - PORT=5057

 kongair-traffic-injector:
  build:
    context: ./traffic-injector
    dockerfile: Dockerfile
  platform: linux/arm64
  container_name: kongair-traffic-injector
  hostname: traffic-injector.kongair
  restart: on-failure
  networks:
    - kong-edu-net
  depends_on:
    - kongair-flights
    - kongair-seating
    - kongair-operations
    - kongair-ancillary
  environment:
    - BASE_URL=http://flights.kongair:8080
    - KONG_URL=http://localhost:8000
    - TPS=10
    - DURATION=5m
    - DARK=true
