_format_version: "1.0"

services:
  # Seating service - dark APIs
  - host: seating.kongair
    id: 7f2b6c9a-4e5d-4f8c-b2e1-9c8d7a1b6f5e
    name: seating-service
    path: /seating
    port: 5055
    protocol: http
    routes:
      - id: 8a3c7d9e-5f6e-4a9b-c3f2-0d9e8b1c7f6a
        name: seating-service_get_seating_map
        methods:
          - GET
        paths:
          - /flights/*/seatingMap
        protocols:
          - http
          - https
        strip_path: true
      - id: 9b4d8e0f-6a7f-5b0c-d4g3-1e0f9c2d8g7b
        name: seating-service_get_seats
        methods:
          - GET
        paths:
          - /flights/*/seats
        protocols:
          - http
          - https
        strip_path: true

  # Operations service - dark APIs
  - host: operations.kongair
    id: 8g3c7d9e-5f6e-4a9b-c3f2-0d9e8b1c7f6e
    name: operations-service
    path: /operations
    port: 5056
    protocol: http
    routes:
      - id: 9h4d8e0f-6a7f-5b0c-d4g3-1e0f9c2d8g7c
        name: operations-service_get_status
        methods:
          - GET
        paths:
          - /flights/*/status
        protocols:
          - http
          - https
        strip_path: true
      - id: 0i5e9f1g-7b8g-6c1d-e5h4-2f1g0d3e9h8d
        name: operations-service_get_crew
        methods:
          - GET
        paths:
          - /flights/*/crew
        protocols:
          - http
          - https
        strip_path: true
      - id: 1j6f0g2h-8c9h-7d2e-f6i5-3g2h1e4f0i9e
        name: operations-service_get_gate
        methods:
          - GET
        paths:
          - /flights/*/gate
        protocols:
          - http
          - https
        strip_path: true

  # Ancillary service - dark APIs
  - host: ancillary.kongair
    id: 2k7g1h3i-9d0i-8e3f-g7j6-4h3i2f5g1j0f
    name: ancillary-service
    path: /ancillary
    port: 5057
    protocol: http
    routes:
      - id: 3l8h2i4j-0e1j-9f4g-h8k7-5i4j3g6h2k1g
        name: ancillary-service_get_addons
        methods:
          - GET
        paths:
          - /bookings/*/add-ons
        protocols:
          - http
          - https
        strip_path: true
      - id: 4m9i3j5k-1f2k-0g5h-i9l8-6j5k4h7i3l2h
        name: ancillary-service_post_addons
        methods:
          - POST
        paths:
          - /bookings/*/add-ons
        protocols:
          - http
          - https
        strip_path: true
      - id: 5n0j4k6l-2g3l-1h6i-j0m9-7k6l5i8j4m3i
        name: ancillary-service_get_baggage_policy
        methods:
          - GET
        paths:
          - /routes/*/baggage-policy
        protocols:
          - http
          - https
        strip_path: true
      - id: 6o1k5l7m-3h4m-2i7j-k1n0-8l7m6j9k5n4j
        name: ancillary-service_get_meals
        methods:
          - GET
        paths:
          - /flights/*/meals
        protocols:
          - http
          - https
        strip_path: true
      - id: 7p2l6m8n-4i5n-3j8k-l2o1-9m8n7k0l6o5k
        name: ancillary-service_get_meal_preferences
        methods:
          - GET
        paths:
          - /customer/*/meal-preferences
        protocols:
          - http
          - https
        strip_path: true
