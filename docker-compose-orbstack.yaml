networks:
  kongair-net:
    name: kongair-net
    driver: bridge
    external: false

services:
 kongair-experience:
  image: kongedu/kongair-experience:1.0
  platform: linux/arm64
  container_name: kongair-experience
  hostname: experience.kongair
  restart: on-failure
  networks:
    - kongair-net
  ports:
   - 5050:4000

 kongair-customers:
  image: kongedu/kongair-customers:1.0
  platform: linux/arm64
  container_name: kongair-customers
  hostname: customers.kongair
  restart: on-failure
  networks:
    - kongair-net
  ports:
   - 5051:3000

 kongair-flights:
  image: kongedu/kongair-flights:1.0
  platform: linux/arm64
  container_name: kongair-flights
  hostname: flights.kongair
  restart: on-failure
  networks:
    - kongair-net
  ports:
   - 5052:8080

 kongair-routes:
  image: kongedu/kongair-routes:1.0
  platform: linux/arm64
  container_name: kongair-routes
  hostname: routes.kongair
  restart: on-failure
  networks:
    - kongair-net
  ports:
   - 5053:8080

 kongair-bookings:
  image: kongedu/kongair-bookings:1.0
  platform: linux/arm64
  container_name: kongair-bookings
  hostname: bookings.kongair
  restart: on-failure
  networks:
    - kongair-net
  ports:
   - 5054:3000

 kongair-seating:
  build:
    context: ./services/seating
    dockerfile: Dockerfile
  platform: linux/arm64
  container_name: kongair-seating
  hostname: seating.kongair
  restart: on-failure
  networks:
    - kongair-net
  ports:
   - 5055:5055
  environment:
    - PORT=5055

 kongair-operations:
  build:
    context: ./services/operations
    dockerfile: Dockerfile
  platform: linux/arm64
  container_name: kongair-operations
  hostname: operations.kongair
  restart: on-failure
  networks:
    - kongair-net
  ports:
   - 5056:5056
  environment:
    - PORT=5056

 kongair-ancillary:
  build:
    context: ./services/ancillary
    dockerfile: Dockerfile
  platform: linux/arm64
  container_name: kongair-ancillary
  hostname: ancillary.kongair
  restart: on-failure
  networks:
    - kongair-net
  ports:
   - 5057:5057
  environment:
    - PORT=5057

 kong:
  image: kong:3.4-alpine
  platform: linux/arm64
  container_name: kong-gateway
  hostname: kong.kongair
  restart: on-failure
  networks:
    - kongair-net
  ports:
    - 8000:8000
    - 8001:8001
  environment:
    - KONG_PROXY_ACCESS_LOG=/dev/stdout
    - KONG_ADMIN_ACCESS_LOG=/dev/stdout
    - KONG_PROXY_ERROR_LOG=/dev/stderr
    - KONG_ADMIN_ERROR_LOG=/dev/stderr
    - KONG_LOG_LEVEL=notice
  depends_on:
    - kongair-seating
    - kongair-operations
    - kongair-ancillary

 kongair-traffic-injector:
  build:
    context: ./traffic-injector
    dockerfile: Dockerfile
  platform: linux/arm64
  container_name: kongair-traffic-injector
  hostname: traffic-injector.kongair
  restart: on-failure
  networks:
    - kongair-net
  depends_on:
    - kong
    - kongair-flights
    - kongair-seating
    - kongair-operations
    - kongair-ancillary
  environment:
    - BASE_URL=http://flights.kongair:8080
    - KONG_URL=http://kong.kongair:8000
    - TPS=10
    - DURATION=5m
    - DARK=true
